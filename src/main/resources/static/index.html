<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Notes Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f7f7f7; }
        .card { background: white; padding: 1.5rem; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        textarea, input { width: 100%; padding: 0.75rem; margin-top: 0.5rem; box-sizing: border-box; }
        button { padding: 0.7rem 1rem; margin-top: 0.75rem; cursor: pointer; }
        .summary { white-space: pre-wrap; }
        .summary ul { margin: 0.5rem 0 0 1.2rem; }
        .summary li { margin-bottom: 0.4rem; }
        .saved-item { border-top: 1px solid #ddd; padding-top: 0.7rem; margin-top: 0.7rem; display:flex; justify-content:space-between; gap:1rem; }
        .saved-left { flex: 1; }
        .saved-actions { white-space: nowrap; }
        .action-btn { margin-left: 0.5rem; padding: 0.35rem 0.6rem; border: none; color: #fff; border-radius: 6px; cursor: pointer; }
        .edit-btn { background: #28a745; }
        .delete-btn { background: #dc3545; }
        .meta { color: #666; font-size: 0.85rem; margin-bottom: 0.3rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>AI Notes Assistant</h1>
    <p>Paste class notes, generate a summary, upload a Word file, and save results for later.</p>
    <textarea id="notes" rows="8" placeholder="Paste notes here..."></textarea>
    <button id="summarizeBtn">Summarize</button>
    <div style="margin-top:1rem;">
        <input type="file" id="uploadFile"
            accept=".docx,.pdf,.txt,.md,.png,.jpg,.jpeg,.bmp,.gif,.tiff" />
        <button id="uploadBtn">Upload File</button>
    </div>
    <h3>Summary</h3>
    <div id="summary" class="summary">No summary yet.</div>
    <input id="title" placeholder="Title for this summary" />
    <button id="saveBtn">Save Summary</button>
</div>
<div class="card">
    <h2>Previous Summaries</h2>
    <div id="savedSummaries"></div>
</div>
<script>
    const summaryBox = document.getElementById('summary');
    const savedBox = document.getElementById('savedSummaries');
    let savedData = [];

    document.getElementById('summarizeBtn').addEventListener('click', async () => {
        const text = document.getElementById('notes').value;
        const response = await fetch('/api/summaries/summarize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        const data = await response.json();
        renderSummary(data.summary);
    });

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('uploadFile');
        const file = fileInput.files[0];
        if (!file) {
            alert('Select a file to upload.');
            return;
        }
        const formData = new FormData();
        formData.append('file', file);
        const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData
        });
        if (!response.ok) {
            alert(await response.text());
            return;
        }
        const data = await response.json();
        renderSummary(data.summary);
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const title = document.getElementById('title').value || 'Untitled summary';
        const originalText = document.getElementById('notes').value;
        const summary = summaryBox.textContent;
        await fetch('/api/summaries', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, originalText, summary })
        });
        loadSummaries();
    });

    async function loadSummaries() {
        const response = await fetch('/api/summaries');
        const summaries = await response.json();
        savedData = summaries;
        if (!summaries.length) {
            savedBox.innerHTML = '<p>No saved summaries yet.</p>';
            return;
        }
        savedBox.innerHTML = summaries.map(item => `
            <div class="saved-item">
                <div class="saved-left">
                    <strong>${item.title}</strong>
                    <div class="meta">${new Date(item.createdAt).toLocaleString()}</div>
                    <div class="summary">${formatSummaryHtml(item.summary)}</div>
                </div>
                <div class="saved-actions">
                    <button class="action-btn edit-btn" data-id="${item.id}">Edit</button>
                    <button class="action-btn delete-btn" data-id="${item.id}">Delete</button>
                </div>
            </div>
        `).join('');

        // attach handlers
        savedBox.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', async (e) => {
            const id = Number(e.target.getAttribute('data-id'));
            const item = savedData.find(s => s.id === id);
            if (!item) return;
            const newTitle = prompt('Edit title', item.title);
            if (newTitle === null) return;
            const newSummary = prompt('Edit summary', item.summary);
            if (newSummary === null) return;
            await fetch('/api/summaries/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle, originalText: item.originalText, summary: newSummary })
            });
            loadSummaries();
        }));

        savedBox.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async (e) => {
            const id = Number(e.target.getAttribute('data-id'));
            if (!confirm('Delete this summary?')) return;
            await fetch('/api/summaries/' + id, { method: 'DELETE' });
            loadSummaries();
        }));
    }

    function renderSummary(summaryText) {
        summaryBox.innerHTML = formatSummaryHtml(summaryText);
    }

    function formatSummaryHtml(summaryText) {
        if (!summaryText) return '';
        const lines = summaryText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length);
        const listItems = lines.map(line => {
            const content = line.replace(/^[-*\u2022]\s*/, '');
            return `<li>${escapeHtml(content)}</li>`;
        });
        if (listItems.length > 1) {
            return `<ul>${listItems.join('')}</ul>`;
        }
        return `<p>${escapeHtml(summaryText)}</p>`;
    }

    function escapeHtml(text) {
        return text.replace(/[&<>"]/, match => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[match]));
    }

    loadSummaries();
</script>
</body>
</html>
